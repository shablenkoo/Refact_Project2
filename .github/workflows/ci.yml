name: Enterprise Quality Gate

on: [push]

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install qrcode pillow pytest pytest-cov opencv-python-headless pyzbar

      - name: Run Tests & Generate Reports
        shell: pwsh
        run: |
          cd Refact_Project2
          python -m pytest --cov=src --cov-report=xml:../coverage.xml --junitxml=../report.xml --cov-report=html:../htmlcov

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0 # Найновіша версія
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: Refact_Project2
          args: >
            -Dsonar.organization=shablenkoo
            -Dsonar.projectKey=shablenkoo_Refact_Project2
            -Dsonar.python.coverage.reportPaths=../coverage.xml
            -Dsonar.python.xunit.reportPath=../report.xml

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Full-Execution-History
          path: |
            coverage.xml
            report.xml
            htmlcov/